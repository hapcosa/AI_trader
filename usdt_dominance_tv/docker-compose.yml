services:
  usdt-dominance:
    build: .
    container_name: usdt-dominance-daemon
    restart: unless-stopped
    volumes:
      - ../data:/app/data
    environment:
      DB_PATH: /app/data/usdt_dominance.db
      POLL_INTERVAL: "60"
      HISTORY_DAYS_INITIAL: "30"
      TV_SYMBOL: "USDT.D"
      TV_EXCHANGE: "CRYPTOCAP"
      TV_USERNAME: "${TV_USERNAME:-}"
      TV_PASSWORD: "${TV_PASSWORD:-}"
      TV_FAIL_THRESHOLD: "3"
      LOG_LEVEL: "INFO"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import sqlite3, os, time, sys
          db = os.environ['DB_PATH']
          c = sqlite3.connect(db)
          row = c.execute("SELECT MAX(ts) FROM bars_1m").fetchone()
          last = row[0] if row else None
          assert last is not None and (time.time() - last) < 300, f"stale: last={last}"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
